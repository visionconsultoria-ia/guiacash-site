<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Seguro | GuiaCash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://static.asaas.com/js/asaas-v2.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-gray-800">1. Seus Dados</h2>
                <div class="grid grid-cols-1 gap-4">
                    <input type="text" id="nome" placeholder="Nome Completo" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="email" id="email" placeholder="E-mail principal" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="cpf" placeholder="CPF ou CNPJ" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" id="whatsapp" placeholder="WhatsApp" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-gray-800">2. Pagamento</h2>
                <div class="flex gap-4 mb-6">
                    <button id="btn-cartao" onclick="togglePagamento('cartao')" class="flex-1 py-3 px-4 border-2 border-blue-600 bg-blue-50 text-blue-600 font-semibold rounded-lg transition-all">Cartão de Crédito</button>
                    <button id="btn-pix" onclick="togglePagamento('pix')" class="flex-1 py-3 px-4 border border-gray-300 text-gray-600 font-semibold rounded-lg transition-all">Pix</button>
                </div>
                
                <div id="sessao-cartao" class="space-y-4">
                    <input type="text" id="card-number" placeholder="Número do Cartão" class="w-full p-3 border border-gray-300 rounded-lg outline-none">
                    <input type="text" id="card-holder" placeholder="Nome impresso no cartão" class="w-full p-3 border border-gray-300 rounded-lg outline-none">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="flex gap-2 col-span-1">
                            <input type="text" id="card-month" placeholder="MM" class="w-full p-3 border border-gray-300 rounded-lg outline-none">
                            <input type="text" id="card-year" placeholder="AA" class="w-full p-3 border border-gray-300 rounded-lg outline-none">
                        </div>
                        <input type="text" id="card-cvv" placeholder="CVV" class="p-3 border border-gray-300 rounded-lg outline-none">
                        <select id="parcelas" class="p-3 border border-gray-300 rounded-lg outline-none bg-white">
                            <option value="1">1x de R$ 297,00</option>
                            <option value="12">12x de R$ 29,70</option>
                        </select>
                    </div>
                </div>

                <div id="sessao-pix" class="hidden text-center py-6">
                    <p class="text-gray-600">O código Pix será gerado após clicar no botão abaixo.</p>
                </div>
            </div>
            
            <button id="btn-finalizar" onclick="processarCheckout()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl text-lg transition-all shadow-lg flex items-center justify-center gap-3">
                <span>FINALIZAR PAGAMENTO AGORA</span>
                <div id="loader" class="hidden loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6"></div>
            </button>
            <p class="text-center text-xs text-gray-500 uppercase tracking-widest mt-4">🔒 Compra 100% Segura e Processada pelo Asaas</p>
        </div>

        <div class="space-y-6">
            <div class="bg-gray-800 text-white p-6 rounded-xl shadow-lg">
                <h3 class="text-lg font-semibold mb-4 border-b border-gray-700 pb-2">Resumo do Pedido</h3>
                <div class="space-y-3">
                    <div class="flex justify-between">
                        <span>GuiaCash - Plano Anual</span>
                        <span class="font-bold">R$ 297,00</span>
                    </div>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-700 flex justify-between items-end">
                    <span class="text-sm text-gray-400">Total hoje:</span>
                    <span class="text-3xl font-bold">R$ 297,00</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl border border-gray-100 text-center">
                <p class="text-sm italic text-gray-600 mb-4">"O melhor sistema de controle que já utilizei para minha consultoria."</p>
                <div class="flex justify-center gap-1">
                    <span class="text-yellow-400">★</span><span class="text-yellow-400">★</span><span class="text-yellow-400">★</span><span class="text-yellow-400">★</span><span class="text-yellow-400">★</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let metodoSelecionado = 'cartao';

        function togglePagamento(tipo) {
            metodoSelecionado = tipo;
            const sCartao = document.getElementById('sessao-cartao');
            const sPix = document.getElementById('sessao-pix');
            const bCartao = document.getElementById('btn-cartao');
            const bPix = document.getElementById('btn-pix');

            if (tipo === 'cartao') {
                sCartao.classList.remove('hidden');
                sPix.classList.add('hidden');
                bCartao.classList.add('border-blue-600', 'bg-blue-50', 'text-blue-600');
                bPix.classList.remove('border-blue-600', 'bg-blue-50', 'text-blue-600');
            } else {
                sCartao.classList.add('hidden');
                sPix.classList.remove('hidden');
                bPix.classList.add('border-blue-600', 'bg-blue-50', 'text-blue-600');
                bCartao.classList.remove('border-blue-600', 'bg-blue-50', 'text-blue-600');
            }
        }

        async function processarCheckout() {
            const btn = document.getElementById('btn-finalizar');
            const loader = document.getElementById('loader');
            
            // UI State: Loading
            btn.disabled = true;
            loader.classList.remove('hidden');

            const userData = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                whatsapp: document.getElementById('whatsapp').value,
                metodo: metodoSelecionado
            };

            if (metodoSelecionado === 'cartao') {
                // Configura a API Key (Pública/Sandbox) do Asaas
                Asaas.setApiKey("aact_hmlg_000MzkwODA2MWY2OGM3MWRlMDU2NWM3MzJlNzZmNGZhZGY6OmYwZGM4MzYxLWU0NjQtNDUzMC04MjI0LWUyMzZiNzZhMWUyMzo6JGFhY2hfOTI5ZDMwNjktYmUxNC00ZWM2LTkwZTItMmY0NzNlNDhiNGRl"); 

                const cardData = {
                    holderName: document.getElementById('card-holder').value,
                    number: document.getElementById('card-number').value,
                    expiryMonth: document.getElementById('card-month').value,
                    expiryYear: document.getElementById('card-year').value,
                    cvv: document.getElementById('card-cvv').value,
                };

                // Inicia Tokenização
                Asaas.CreditCard.tokenize(cardData, function(token) {
                    enviarParaN8N({ ...userData, cardToken: token });
                }, function(errors) {
                    alert("Erro no cartão: " + errors[0].description);
                    resetButton();
                });
            } else {
                enviarParaN8N(userData);
            }
        }

        async function enviarParaN8N(payload) {
            try {
                const response = await fetch('SUA_URL_WEBHOOK_N8N_AQUI', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    // Se for Pix, você pode receber o QR Code aqui e exibir
                    alert("Pedido processado! Redirecionando...");
                    window.location.href = "https://guiacash.com.br/obrigado";
                } else {
                    alert("Erro ao processar com o servidor.");
                }
            } catch (e) {
                console.error(e);
            } finally {
                resetButton();
            }
        }

        function resetButton() {
            document.getElementById('btn-finalizar').disabled = false;
            document.getElementById('loader').classList.add('hidden');
        }
    </script>
</body>
</html>

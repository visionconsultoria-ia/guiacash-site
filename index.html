<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guia Cash | Audiência</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           SISTEMA DE CORES E VARIÁVEIS GLOBAIS
        ========================================= */
        :root {
            --bg-white: #FFFFFF;
            --bg-light: #F8FAFC;
            --text-dark: #363636;
            --text-gray: #555555;
            --border-light: #E2E8F0;

            /* Paleta: Dark Cyan */
            --pj-dark: #006974;
            --pj-base: #009196;
            --pj-light: #18b6b5;

            /* Paleta: Violeta-azulado */
            --pf-dark: #5242d7;
            --pf-base: #5c4bdf;
            --pf-light: #8670ff;

            /* Paleta: Amarelo-alaranjado */
            --div-dark: #d68910; 
            --div-base: #f5a722;
            --div-light: #fbbb4f;

            /* Gradients */
            --pf-pj-gradient: linear-gradient(90deg, var(--pf-base), var(--pj-base));
            --debt-gradient: linear-gradient(90deg, #db941b, #f5a722, #fbbb4f);
            --pj-gradient: linear-gradient(90deg, #006974, #009196, #18b6b5);
        }

        /* RESET & ANTI-SCROLL HORIZONTAL */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden; 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-white);
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 1140px; margin: 0 auto; padding: 0 24px; }

        /* Tipografia Base */
        h2 { font-weight: 800; line-height: 1.2; letter-spacing: -0.03em; color: var(--text-dark); font-size: 2.2rem; margin-bottom: 1rem; }

        .bg-light { background-color: var(--bg-light); }

        /* =========================================
           SESSÃO: TYPEWRITER SLIDER & AUDIENCE 
        ========================================= */
        /* Ajuste 1: Padding Desktop (-10% topo, -40% fundo) */
        #sessao-audiencia { padding-top: 90px; padding-bottom: 72px; position: relative; }

        .section-title { text-align: center; margin-bottom: 40px; }
        
        .slider-wrapper { 
            position: relative; max-width: 900px; margin: 0 auto 40px; 
            display: flex; align-items: center; justify-content: center; min-height: 100px; 
            touch-action: pan-y; 
        }
        .typewriter-container { flex: 1; text-align: center; padding: 0 50px; } 
        
        .color-pf-pj { background: var(--pf-pj-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .color-pf-only { color: var(--pf-base); }
        .color-debt-only { background: var(--debt-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .color-pj-only { background: var(--pj-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #typewriter-text { font-size: 1.4rem; font-weight: 800; line-height: 1.4; display: inline-block; position: relative; transition: all 0.3s ease; }
        
        .cursor { display: inline-block; width: 3px; background-color: currentColor; margin-left: 3px; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .slider-btn { 
            background: none; border: none; font-size: 1.6rem; cursor: pointer; 
            transition: 0.3s; padding: 10px; z-index: 10; position: absolute; 
            top: 50%; transform: translateY(-50%); 
        }
        .slider-btn i { transition: all 0.3s ease; } 
        .slider-btn.prev { left: 0; }
        .slider-btn.next { right: 0; }

        .fade-up { opacity: 0; transform: translateY(20px); }
        .active { opacity: 1; transform: translateY(0); }

        /* GRID BLINDADO */
        .audience-wrapper-desktop {
            display: flex;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .audience-col {
            display: flex;
            flex-direction: column;
            flex: 1; 
        }
        
        /* Ajuste 3: Espaço entre colunas no desktop (-30%) */
        .audience-col:not(:last-child) {
            margin-right: 16px;
        }

        .audience-wrapper-mobile {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 380px;
            margin: 0 auto;
            width: 100%;
        }

        .role-card { 
            background: linear-gradient(var(--bg-white), var(--bg-white)) padding-box,
                        var(--pf-pj-gradient) border-box;
            border: 2px solid transparent; 
            border-radius: 12px; 
            padding: 10px 16px; 
            display: flex; align-items: center; gap: 12px; 
            font-weight: 600; font-size: 0.95rem; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            transition: transform 0.3s, box-shadow 0.3s; 
            height: 85px; 
            width: 100%;
        }
        
        /* Ajuste 2: Espaço entre os cards empilhados (-40%) */
        .audience-col .role-card:not(:last-child) { margin-bottom: 14px; }
        .audience-wrapper-mobile .role-card { margin-bottom: 12px; }
        .audience-wrapper-mobile .role-card:last-child { margin-bottom: 0; }

        .role-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(92, 75, 223, 0.15); }
        
        .icon-bg {
            background: rgba(92, 75, 223, 0.1); 
            width: 44px; height: 44px; 
            border-radius: 8px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            flex-shrink: 0; 
        }

        .role-card i { 
            background: var(--pf-pj-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.25rem; 
            line-height: 1.5; 
            padding-top: 2px; 
        }

        /* -----------------------------------------
           CONTROLE ESTRITO DE RESPONSIVIDADE
           ----------------------------------------- */
        .mobile-only { display: none !important; }
        .desktop-only { display: flex !important; } 

        @media (max-width: 768px) {
            .mobile-only { display: flex !important; } 
            .desktop-only { display: none !important; }
            
            /* Ajuste 1: Padding Mobile (-10% topo, -40% fundo) */
            #sessao-audiencia { padding-top: 63px; padding-bottom: 48px; } 
            
            .slider-wrapper { min-height: 100px; margin-bottom: 30px; }
            .typewriter-container { padding: 0 25px; } 
            
            .slider-btn { font-size: 1.4rem; padding: 5px; }
            .slider-btn.prev { left: -10px; } 
            .slider-btn.next { right: -10px; } 
            
            #typewriter-text { font-size: 1.15rem; }
            h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- 2. AUDIÊNCIA DINÂMICA -->
    <section id="sessao-audiencia" class="bg-light">
        <div class="container">
            <h2 class="section-title">O Guia Cash é para quem?</h2>
            
            <!-- SLIDER DINÂMICO -->
            <div class="slider-wrapper">
                <button class="slider-btn prev" onclick="prevSlide()"><i class="fa-solid fa-chevron-left" id="icon-prev"></i></button>
                
                <div class="typewriter-container">
                    <div id="typewriter-text" class="fade-up">
                        <span class="typing-text"></span><span class="cursor">|</span>
                    </div>
                </div>
                
                <button class="slider-btn next" onclick="nextSlide()"><i class="fa-solid fa-chevron-right" id="icon-next"></i></button>
            </div>

            <!-- GRID DE AUDIÊNCIA - DESKTOP -->
            <div class="audience-wrapper-desktop desktop-only">
                <div class="audience-col">
                    <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-briefcase"></i></div> Prestador de serviço</div>
                    <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-building"></i></div> Empresário</div>
                </div>
                <div class="audience-col">
                    <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-user-doctor"></i></div> Profissional liberal</div>
                    <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-user-tie"></i></div> Autônomo</div>
                </div>
                <div class="audience-col">
                    <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-store"></i></div> Loja virtual ou física</div>
                    <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-laptop"></i></div> Infoprodutor e Influenciador</div>
                </div>
            </div>

            <!-- GRID DE AUDIÊNCIA - MOBILE -->
            <div class="audience-wrapper-mobile mobile-only">
                <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-user-doctor"></i></div> Profissional liberal</div>
                <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-user-tie"></i></div> Autônomo</div>
                <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-building"></i></div> Empresário</div>
                <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-briefcase"></i></div> Prestador de serviço</div>
                <div class="role-card"><div class="icon-bg"><i class="fa-solid fa-store"></i></div> Loja Física ou Virtual</div>
            </div>

        </div>
    </section>

    <!-- SCRIPTS DO SLIDER -->
    <script>
        const phrases =[
            { text: "É um excelente técnico atarefado. Mas um gestor improvisado", color: "color-pf-pj" },
            { text: "Tem medo de olhar o extrato/fatura e sente vergonha da situação financeira", color: "color-pf-only" },
            { text: "O dinheiro está afetando o relacionamento", color: "color-pf-only" },
            { text: "Precisa separar PJ da PF e ser mais profissional", color: "color-pf-pj" },
            { text: "Quer evitar dívidas ou viver livre delas", color: "color-debt-only" },
            { text: "Quer liberdade para realizar sonhos, mas não consegue juntar dinheiro", color: "color-pf-pj" },
            { text: "Se preocupa com o futuro financeiro, padrão de vida ou aposentadoria", color: "color-pf-only" },
            { text: "Já tentou usar planilha, sistema, apps mas nada vingou com efeito", color: "color-pj-only" }
        ];

        let currentIdx = 0;
        let isTyping = false;
        let hasStarted = false;
        let typeInterval;
        let waitTimeout;
        
        const textEl = document.getElementById("typewriter-text");
        const typingEl = textEl.querySelector(".typing-text");
        const iconPrev = document.getElementById("icon-prev");
        const iconNext = document.getElementById("icon-next");

        function typeEffect() {
            clearInterval(typeInterval);
            clearTimeout(waitTimeout);
            isTyping = true;
            
            const phrase = phrases[currentIdx];
            
            textEl.className = "fade-up active " + phrase.color;
            iconPrev.className = `fa-solid fa-chevron-left ${phrase.color}`;
            iconNext.className = `fa-solid fa-chevron-right ${phrase.color}`;

            typingEl.textContent = "";
            
            let charIdx = 0;
            typeInterval = setInterval(() => {
                typingEl.textContent += phrase.text[charIdx];
                charIdx++;
                if (charIdx >= phrase.text.length) {
                    clearInterval(typeInterval);
                    isTyping = false;
                    waitTimeout = setTimeout(nextSlide, 5000); 
                }
            }, 40);
        }

        function nextSlide() {
            clearInterval(typeInterval);
            clearTimeout(waitTimeout);
            textEl.classList.remove("active");
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % phrases.length;
                typeEffect();
            }, 300); 
        }

        function prevSlide() {
            clearInterval(typeInterval);
            clearTimeout(waitTimeout);
            textEl.classList.remove("active");
            setTimeout(() => {
                currentIdx = (currentIdx - 1 + phrases.length) % phrases.length;
                typeEffect();
            }, 300);
        }

        const sliderWrapper = document.querySelector('.slider-wrapper');
        let touchstartX = 0;
        
        sliderWrapper.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});
        
        sliderWrapper.addEventListener('touchend', e => {
            let touchendX = e.changedTouches[0].screenX;
            if (touchstartX - touchendX > 50) nextSlide(); 
            if (touchendX - touchstartX > 50) prevSlide(); 
        }, {passive: true});

        const observer = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting && !hasStarted) {
                hasStarted = true;
                typeEffect();
            }
        }, { threshold: 0.3 }); 

        observer.observe(document.getElementById('sessao-audiencia'));
    </script>
</body>
</html>
